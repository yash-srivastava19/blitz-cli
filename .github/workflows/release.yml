name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            asset: blitz-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            asset: blitz-linux-arm64
          - target: bun-darwin-x64
            os: macos-latest
            asset: blitz-darwin-x64
          - target: bun-darwin-arm64
            os: macos-latest
            asset: blitz-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          mkdir -p dist
          bun build --compile --minify --bytecode \
            --target=${{ matrix.target }} \
            ./src/cli.ts \
            --outfile dist/${{ matrix.asset }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
